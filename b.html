<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LinguaLens AR</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
:root {
  --app-bg: #140806;
  --panel-bg: #1e0c09;
  --border-dim: #3a1611;
  --vermilion: #e63925;
  --vermilion-glow: rgba(230, 57, 37, 0.25);
  --turmeric: #f9ba15;
  --turmeric-glow: rgba(249, 186, 21, 0.2);
  --text-main: #fdf2f0;
  --text-muted: #d0a49d;
  --font-sans: 'Inter', sans-serif;
  --font-disp: 'Syne', sans-serif;
  --rad: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background-color: var(--app-bg);
  color: var(--text-main);
  font-family: var(--font-sans);
  min-height: 100vh;
  overflow-x: hidden;
  background-image: radial-gradient(circle at 50% 0%, var(--vermilion-glow) 0%, transparent 50%);
}
.wrapper {
  max-width: 1280px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 2rem;
}
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border-dim);
  padding-bottom: 1.5rem;
  animation: fade-in 0.8s ease-out;
}
.logo-area {
  display: flex;
  align-items: center;
  gap: 1rem;
}
.logo-mark {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--vermilion), var(--turmeric));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  transform: rotate(45deg);
  box-shadow: 0 0 20px var(--vermilion-glow);
}
.logo-mark svg {
  transform: rotate(-45deg);
  width: 20px;
  height: 20px;
  color: #fff;
}
.logo-text {
  font-family: var(--font-disp);
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.status-indicator {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  background: var(--panel-bg);
  padding: 0.5rem 1rem;
  border-radius: 99px;
  border: 1px solid var(--border-dim);
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: all 0.3s ease;
}
.dot.live { background: var(--turmeric); box-shadow: 0 0 10px var(--turmeric); }
.dot.busy { background: var(--vermilion); animation: pulse 1s infinite alternate; }
.core-grid {
  display: grid;
  grid-template-columns: 1fr 400px;
  gap: 1.5rem;
  animation: slide-up 0.8s ease-out;
}
@media (max-width: 900px) {
  .core-grid { grid-template-columns: 1fr; }
}
.panel {
  background: var(--panel-bg);
  border: 1px solid var(--border-dim);
  border-radius: var(--rad);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.panel-hdr {
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border-dim);
  font-family: var(--font-disp);
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--turmeric);
  text-transform: uppercase;
  display: flex;
  justify-content: space-between;
}
.cam-container {
  position: relative;
  background: #000;
  aspect-ratio: 4/3;
  width: 100%;
}
#vid-feed {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
#canvas-overlay {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
.reticle {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 60px;
  height: 60px;
  pointer-events: none;
  opacity: 0.3;
}
.reticle::before, .reticle::after {
  content: '';
  position: absolute;
  background: var(--turmeric);
}
.reticle::before { width: 2px; height: 100%; left: 29px; }
.reticle::after { height: 2px; width: 100%; top: 29px; }
.corner { position: absolute; width: 30px; height: 30px; border: 2px solid var(--vermilion); opacity: 0.6; }
.corner.tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
.corner.tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
.corner.bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
.corner.br { bottom: 20px; right: 20px; border-left: none; border-top: none; }
.cam-shroud {
  position: absolute;
  inset: 0;
  background: var(--app-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.5s;
}
.cam-shroud.hidden { opacity: 0; pointer-events: none; }
.controls {
  padding: 1.25rem;
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  align-items: center;
}
.select-group {
  display: flex;
  gap: 0.5rem;
  flex: 1;
  min-width: 240px;
}
select {
  flex: 1;
  background: var(--app-bg);
  border: 1px solid var(--border-dim);
  color: var(--text-main);
  padding: 0.75rem 1rem;
  border-radius: 6px;
  font-family: var(--font-sans);
  font-size: 0.85rem;
  appearance: none;
  cursor: pointer;
  outline: none;
}
select:focus { border-color: var(--turmeric); }
.btn {
  padding: 0.75rem 1.5rem;
  border-radius: 6px;
  font-family: var(--font-disp);
  font-weight: 700;
  font-size: 0.8rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}
.btn-primary {
  background: var(--vermilion);
  color: #fff;
}
.btn-primary:hover:not(:disabled) {
  background: #ff4b38;
  box-shadow: 0 0 15px var(--vermilion-glow);
}
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-sec {
  background: transparent;
  border: 1px solid var(--turmeric);
  color: var(--turmeric);
}
.btn-sec:hover {
  background: var(--turmeric-glow);
}
.side-stack {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}
.data-box {
  padding: 1.25rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.data-output {
  background: var(--app-bg);
  border: 1px solid var(--border-dim);
  border-radius: 6px;
  padding: 1rem;
  font-size: 0.9rem;
  line-height: 1.6;
  min-height: 100px;
  max-height: 200px;
  overflow-y: auto;
  color: var(--text-main);
  white-space: pre-wrap;
  word-break: break-word;
}
.data-output.empty { color: var(--text-muted); font-style: italic; }
.progress-container {
  height: 4px;
  background: var(--app-bg);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 0.5rem;
}
.progress-bar {
  height: 100%;
  width: 0%;
  background: var(--turmeric);
  transition: width 0.3s;
}
.progress-text {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 0.5rem;
}
.actions {
  display: flex;
  gap: 0.5rem;
}
.btn-sm {
  padding: 0.5rem 0.75rem;
  font-size: 0.7rem;
  background: var(--app-bg);
  border: 1px solid var(--border-dim);
  color: var(--text-main);
  border-radius: 4px;
  cursor: pointer;
  flex: 1;
}
.btn-sm:hover:not(:disabled) { border-color: var(--vermilion); color: var(--vermilion); }
.btn-sm:disabled { opacity: 0.3; }
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translate(-50%, 20px);
  background: var(--vermilion);
  color: #fff;
  padding: 0.75rem 2rem;
  border-radius: 99px;
  font-family: var(--font-disp);
  font-weight: 600;
  font-size: 0.85rem;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: 0 10px 30px rgba(230, 57, 37, 0.3);
  z-index: 1000;
}
.toast.visible { opacity: 1; transform: translate(-50%, 0); }
#hidden-canvas { display: none; }
@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
@keyframes slide-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { from { opacity: 1; } to { opacity: 0.4; } }
</style>
</head>
<body>
<canvas id="hidden-canvas"></canvas>
<div class="wrapper">
  <header class="top-bar">
    <div class="logo-area">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
        </svg>
      </div>
      <div class="logo-text">LinguaLens</div>
    </div>
    <div class="status-indicator">
      <div class="dot" id="state-dot"></div>
      <span id="state-text">Offline</span>
    </div>
  </header>
  <main class="core-grid">
    <section class="panel">
      <div class="panel-hdr">Optics & Capture</div>
      <div class="cam-container">
        <video id="vid-feed" autoplay muted playsinline></video>
        <canvas id="canvas-overlay"></canvas>
        <div class="reticle"></div>
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="cam-shroud" id="cam-shroud">
          <span style="color:var(--text-muted); font-size:0.85rem; letter-spacing:0.05em;">SYSTEM STANDBY</span>
        </div>
      </div>
      <div class="controls">
        <div class="select-group">
          <select id="lang-in">
            <option value="eng">English (Detect)</option>
            <option value="fra">French (Detect)</option>
            <option value="deu">German (Detect)</option>
            <option value="spa">Spanish (Detect)</option>
            <option value="ita">Italian (Detect)</option>
          </select>
          <select id="lang-out">
            <option value="hi">To Hindi</option>
            <option value="en">To English</option>
            <option value="fr">To French</option>
            <option value="es">To Spanish</option>
            <option value="ja">To Japanese</option>
          </select>
        </div>
        <button class="btn btn-sec" id="btn-power">Initialize</button>
        <button class="btn btn-primary" id="btn-trigger" disabled>Capture</button>
      </div>
    </section>
    <aside class="side-stack">
      <section class="panel">
        <div class="panel-hdr">
          <span>Analysis</span>
          <span id="pct-val" style="color:var(--text-main)">0%</span>
        </div>
        <div class="data-box">
          <div>
            <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
            <div class="progress-text" id="p-text">Awaiting input...</div>
          </div>
          <div class="data-output empty" id="out-ocr">Raw data will appear here.</div>
        </div>
      </section>
      <section class="panel">
        <div class="panel-hdr">Synthesis</div>
        <div class="data-box">
          <div class="data-output empty" id="out-trans">Translated stream will appear here.</div>
          <div class="actions">
            <button class="btn-sm" id="btn-copy" disabled>Copy</button>
            <button class="btn-sm" id="btn-share" disabled>Share</button>
            <button class="btn-sm" id="btn-tog-ovr" disabled>Toggle HUD</button>
          </div>
        </div>
      </section>
    </aside>
  </main>
</div>
<div class="toast" id="sys-toast"></div>
<script>
const S = {
  active: false,
  processing: false,
  stream: null,
  txtSrc: '',
  txtTgt: '',
  showHUD: true
};
const dom = id => document.getElementById(id);
const vid = dom('vid-feed');
const cvsOvr = dom('canvas-overlay');
const ctxOvr = cvsOvr.getContext('2d');
const cvsHid = dom('hidden-canvas');
const ctxHid = cvsHid.getContext('2d');

function setStatus(msg, type) {
  dom('state-text').textContent = msg;
  dom('state-dot').className = `dot ${type}`;
}

function notify(msg) {
  const t = dom('sys-toast');
  t.textContent = msg;
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), 3000);
}

function syncCanvas() {
  cvsOvr.width = vid.videoWidth || vid.clientWidth;
  cvsOvr.height = vid.videoHeight || vid.clientHeight;
}

async function togglePower() {
  if (S.active) {
    if (S.stream) S.stream.getTracks().forEach(t => t.stop());
    vid.srcObject = null;
    S.stream = null;
    S.active = false;
    dom('cam-shroud').classList.remove('hidden');
    dom('btn-power').textContent = 'Initialize';
    dom('btn-trigger').disabled = true;
    ctxOvr.clearRect(0, 0, cvsOvr.width, cvsOvr.height);
    setStatus('Offline', '');
  } else {
    try {
      S.stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });
      vid.srcObject = S.stream;
      await vid.play();
      dom('cam-shroud').classList.add('hidden');
      dom('btn-power').textContent = 'Terminate';
      dom('btn-trigger').disabled = false;
      S.active = true;
      vid.addEventListener('loadedmetadata', syncCanvas, { once: true });
      syncCanvas();
      setStatus('Online', 'live');
    } catch (e) {
      notify('Optical sensor access denied');
      setStatus('Error', 'busy');
    }
  }
}

function extractFrame() {
  const w = vid.videoWidth || 640;
  const h = vid.videoHeight || 480;
  cvsHid.width = w;
  cvsHid.height = h;
  ctxHid.drawImage(vid, 0, 0, w, h);
  const data = ctxHid.getImageData(0, 0, w, h);
  const px = data.data;
  for (let i = 0; i < px.length; i += 4) {
    const v = Math.min(255, Math.max(0, ((0.299 * px[i] + 0.587 * px[i+1] + 0.114 * px[i+2]) - 128) * 1.5 + 128));
    px[i] = px[i+1] = px[i+2] = v;
  }
  ctxHid.putImageData(data, 0, 0);
  return cvsHid;
}

function updateProgress(val, msg) {
  dom('p-bar').style.width = `${val}%`;
  dom('pct-val').textContent = `${Math.round(val)}%`;
  dom('p-text').textContent = msg;
}

async function processFrame(canvas) {
  updateProgress(0, 'Initializing Engine');
  const out = dom('out-ocr');
  out.className = 'data-output empty';
  out.textContent = 'Analyzing...';
  try {
    const lang = dom('lang-in').value;
    const res = await Tesseract.recognize(canvas, lang, {
      logger: m => {
        if (m.status === 'recognizing text') {
          updateProgress(30 + m.progress * 70, 'Extracting metrics');
        } else {
          updateProgress(15, 'Loading core data');
        }
      }
    });
    const raw = res.data.text || '';
    const clean = raw.trim();
    
    if (clean.length > 1) {
      updateProgress(100, `Complete`);
      out.className = 'data-output';
      out.textContent = clean;
      S.txtSrc = clean;
      return clean;
    } else {
      updateProgress(100, 'Signal too weak. Aborting.');
      out.textContent = 'Insufficient data clarity. Adjust focus and lighting.';
      S.txtSrc = '';
      return null;
    }
  } catch (e) {
    updateProgress(0, 'Engine failure');
    out.textContent = 'Critical error during analysis.';
    return null;
  }
}

const codes = { eng: 'en', fra: 'fr', deu: 'de', spa: 'es', ita: 'it' };

async function synthesizeText(text) {
  const tOut = dom('out-trans');
  tOut.className = 'data-output empty';
  tOut.textContent = 'Synthesizing...';
  ['btn-copy', 'btn-share', 'btn-tog-ovr'].forEach(id => dom(id).disabled = true);
  try {
    const src = codes[dom('lang-in').value] || 'en';
    const tgt = dom('lang-out').value;
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${src}&tl=${tgt}&dt=t&q=${encodeURIComponent(text)}`;
    const res = await fetch(url);
    const data = await res.json();
    let final = '';
    for (let i = 0; i < data[0].length; i++) {
      if (data[0][i][0]) final += data[0][i][0];
    }
    tOut.className = 'data-output';
    tOut.textContent = final;
    S.txtTgt = final;
    ['btn-copy', 'btn-share', 'btn-tog-ovr'].forEach(id => dom(id).disabled = false);
    if (S.showHUD) renderHUD(final);
  } catch (e) {
    tOut.textContent = 'Network synthesis failed.';
  }
}

function renderHUD(text) {
  syncCanvas();
  const w = cvsOvr.width, h = cvsOvr.height;
  ctxOvr.clearRect(0, 0, w, h);
  if (!text) return;
  const fs = Math.max(14, Math.min(20, w / 35));
  ctxOvr.font = `600 ${fs}px 'Inter', sans-serif`;
  const maxW = w * 0.8;
  const lines = [];
  let cur = '';
  for (const word of text.split(' ')) {
    const test = cur ? cur + ' ' + word : word;
    if (ctxOvr.measureText(test).width > maxW - 40) { lines.push(cur); cur = word; }
    else cur = test;
  }
  if (cur) lines.push(cur);
  const boxH = 40 + lines.length * (fs * 1.5);
  const boxX = (w - maxW) / 2;
  const boxY = h - boxH - 30;
  ctxOvr.fillStyle = 'rgba(30, 12, 9, 0.95)';
  ctxOvr.beginPath();
  ctxOvr.roundRect(boxX, boxY, maxW, boxH, 12);
  ctxOvr.fill();
  ctxOvr.strokeStyle = '#e63925';
  ctxOvr.lineWidth = 2;
  ctxOvr.beginPath();
  ctxOvr.moveTo(boxX + 20, boxY);
  ctxOvr.lineTo(boxX + maxW - 20, boxY);
  ctxOvr.stroke();
  ctxOvr.fillStyle = '#f9ba15';
  ctxOvr.font = `700 ${fs - 4}px 'Syne', sans-serif`;
  ctxOvr.fillText('DATA STREAM', boxX + 20, boxY + 25);
  ctxOvr.fillStyle = '#fdf2f0';
  ctxOvr.font = `400 ${fs}px 'Inter', sans-serif`;
  lines.forEach((l, i) => ctxOvr.fillText(l, boxX + 20, boxY + 55 + i * (fs * 1.5)));
}

dom('btn-power').addEventListener('click', togglePower);

dom('btn-trigger').addEventListener('click', async () => {
  if (!S.active) return;
  const btn = dom('btn-trigger');
  if (vid.paused) {
    vid.play();
    ctxOvr.clearRect(0, 0, cvsOvr.width, cvsOvr.height);
    btn.textContent = 'Capture';
    setStatus('Online', 'live');
    return;
  }
  if (S.processing) return;
  S.processing = true;
  btn.disabled = true;
  btn.textContent = 'Processing';
  setStatus('Analyzing', 'busy');
  vid.pause();
  const cvs = extractFrame();
  const txt = await processFrame(cvs);
  if (txt) await synthesizeText(txt);
  S.processing = false;
  btn.disabled = false;
  if (vid.paused) {
    btn.textContent = 'Resume';
    setStatus('Paused', '');
  } else {
    btn.textContent = 'Capture';
    setStatus('Online', 'live');
  }
});

dom('btn-copy').addEventListener('click', () => {
  if (!S.txtTgt) return;
  navigator.clipboard.writeText(S.txtTgt).then(() => notify('Copied to clipboard')).catch(() => {
    const t = document.createElement('textarea');
    t.value = S.txtTgt; document.body.appendChild(t);
    t.select(); document.execCommand('copy'); t.remove();
    notify('Copied to clipboard');
  });
});

dom('btn-share').addEventListener('click', async () => {
  if (!S.txtTgt) return;
  const p = { title: 'Analysis', text: `${S.txtSrc}\n\n${S.txtTgt}` };
  if (navigator.share) { try { await navigator.share(p); } catch (e) {} }
  else { navigator.clipboard.writeText(p.text); notify('Data copied for routing'); }
});

dom('btn-tog-ovr').addEventListener('click', () => {
  S.showHUD = !S.showHUD;
  if (S.showHUD && S.txtTgt) renderHUD(S.txtTgt);
  else ctxOvr.clearRect(0, 0, cvsOvr.width, cvsOvr.height);
  notify(S.showHUD ? 'HUD Enabled' : 'HUD Disabled');
});

window.addEventListener('resize', syncCanvas);
</script>
</body>
</html>
